semgrep:
  display_name: Semgrep
  category: sast
  supported_languages: [python, javascript, typescript, go, java, csharp, kotlin, ruby, php]
  install:
    strategy: pipx
    package: semgrep
    module: semgrep
  executable:
    windows: semgrep.exe
    darwin: semgrep
    linux: semgrep
  description: Multi-language static analysis with AST and taint modes

actionlint:
  display_name: actionlint
  category: ci_cd
  supported_languages: [yaml]
  install:
    strategy: github-release
    repo: rhysd/actionlint
    asset_patterns:
      windows_amd64: actionlint_.*_windows_amd64\.zip
      windows_arm64: actionlint_.*_windows_arm64\.zip
      linux_amd64: actionlint_.*_linux_amd64\.tar\.gz
      linux_arm64: actionlint_.*_linux_arm64\.tar\.gz
      darwin_amd64: actionlint_.*_darwin_amd64\.tar\.gz
      darwin_arm64: actionlint_.*_darwin_arm64\.tar\.gz
  executable:
    windows: actionlint.exe
    darwin: actionlint
    linux: actionlint
  description: GitHub Actions workflow validation and CI/CD pipeline linting

bandit:
  display_name: Bandit
  category: sast
  supported_languages: [python]
  install:
    strategy: pipx
    package: bandit
    module: bandit
  executable:
    windows: bandit.exe
    darwin: bandit
    linux: bandit
  description: Python SAST scanner

pylint:
  display_name: Pylint
