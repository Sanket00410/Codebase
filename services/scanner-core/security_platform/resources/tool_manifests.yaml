semgrep:
  display_name: Semgrep
  category: sast
  supported_languages: [python, javascript, typescript, go, java, csharp, kotlin, ruby, php]
  install:
    strategy: pipx
    package: semgrep
    module: semgrep
  executable:
    windows: semgrep.exe
    darwin: semgrep
    linux: semgrep
  description: Multi-language static analysis with AST and taint modes

bandit:
  display_name: Bandit
  category: sast
  supported_languages: [python]
  install:
    strategy: pipx
    package: bandit
    module: bandit
  executable:
    windows: bandit.exe
    darwin: bandit
    linux: bandit
  description: Python SAST scanner

gitleaks:
  display_name: Gitleaks
  category: secrets
  supported_languages: []
  install:
    strategy: github-release
    repo: gitleaks/gitleaks
    asset_patterns:
      windows_amd64: gitleaks_.*_windows_x64\.zip
      windows_arm64: gitleaks_.*_windows_arm64\.zip
      linux_amd64: gitleaks_.*_linux_x64\.tar\.gz
      linux_arm64: gitleaks_.*_linux_arm64\.tar\.gz
      darwin_amd64: gitleaks_.*_darwin_x64\.zip
      darwin_arm64: gitleaks_.*_darwin_arm64\.zip
  executable:
    windows: gitleaks.exe
    darwin: gitleaks
    linux: gitleaks
  description: Git and filesystem secret detection

checkov:
  display_name: Checkov
  category: iac
  supported_languages: [terraform, yaml]
  install:
    strategy: pipx
    package: checkov
    module: checkov.main
  executable:
    windows: checkov.cmd
    darwin: checkov
    linux: checkov
  description: Infrastructure as code scanner

trivy:
  display_name: Trivy
  category: container
  supported_languages: []
  install:
    strategy: github-release
    repo: aquasecurity/trivy
