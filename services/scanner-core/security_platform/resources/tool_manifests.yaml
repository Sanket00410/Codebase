      windows_arm64: trivy_.*_Windows-ARM64\.zip
      linux_amd64: trivy_.*_Linux-64bit\.tar\.gz
      linux_arm64: trivy_.*_Linux-ARM64\.tar\.gz
      darwin_amd64: trivy_.*_macOS-64bit\.tar\.gz
      darwin_arm64: trivy_.*_macOS-ARM64\.tar\.gz
  executable:
    windows: trivy.exe
    darwin: trivy
    linux: trivy
  description: Vulnerability, secret, and misconfiguration scanner

osv-scanner:
  display_name: OSV-Scanner
  category: sca
  supported_languages: [python, javascript, typescript, java, go, rust]
  install:
    strategy: github-release
    repo: google/osv-scanner
    asset_patterns:
      windows_amd64: osv-scanner_windows_amd64\.exe
      windows_arm64: osv-scanner_windows_arm64\.exe
      linux_amd64: osv-scanner_linux_amd64
      linux_arm64: osv-scanner_linux_arm64
      darwin_amd64: osv-scanner_darwin_amd64
      darwin_arm64: osv-scanner_darwin_arm64
  executable:
    windows: osv-scanner.exe
    darwin: osv-scanner
    linux: osv-scanner
  description: Dependency vulnerability scanner backed by OSV

